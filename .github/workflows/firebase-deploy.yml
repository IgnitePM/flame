name: Deploy Firebase (functions + rules)

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve Firebase CI credentials
        id: auth
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            node -e "JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT)" || {
              echo "::error::FIREBASE_SERVICE_ACCOUNT is not valid JSON."
              exit 1
            }
            echo "method=service_account" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "method=token" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::No Firebase deploy credentials configured."
          echo ""
          echo "Option A (blocked by some org policies): GitHub secret FIREBASE_SERVICE_ACCOUNT = service account JSON."
          echo "Option B (works when key creation is disabled): GitHub secret FIREBASE_TOKEN from 'firebase login:ci'."
          echo "Option C: deploy manually — firebase login && firebase deploy --only firestore:rules,storage --project time-tracker-1f2af"
          exit 1

      - name: Write service account credentials
        if: steps.auth.outputs.method == 'service_account'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Install function dependencies
        run: npm ci --prefix functions || npm install --prefix functions

      - name: Deploy Firestore + Storage rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "token" ]; then
            npx firebase-tools deploy \
              --only firestore:rules,storage \
              --project time-tracker-1f2af \
              --non-interactive --force \
              --token "$FIREBASE_TOKEN"
          else
            npx firebase-tools deploy \
              --only firestore:rules,storage \
              --project time-tracker-1f2af \
              --non-interactive --force
          fi

      - name: Deploy Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "token" ]; then
            npx firebase-tools deploy \
              --only functions \
              --project time-tracker-1f2af \
              --non-interactive --force \
              --token "$FIREBASE_TOKEN"
          else
            npx firebase-tools deploy \
              --only functions \
              --project time-tracker-1f2af \
              --non-interactive --force
          fi
